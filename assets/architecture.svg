    <text x="140" y="760" fill="#f6f8ff" font-family="Arial, sans-serif" font-size="28" font-weight="700">Bounded agent loop</text>

    <g font-family="Arial, sans-serif">
      <circle cx="220" cy="860" r="58" fill="#163a58" stroke="#76dff9" stroke-width="3"/>
      <text x="220" y="872" fill="#76dff9" font-size="36" font-weight="700" text-anchor="middle">1</text>
      <text x="220" y="956" fill="#f6f8ff" font-size="24" font-weight="700" text-anchor="middle">REMEMBER</text>

      <circle cx="575" cy="860" r="58" fill="#163a58" stroke="#76dff9" stroke-width="3"/>
      <text x="575" y="872" fill="#76dff9" font-size="36" font-weight="700" text-anchor="middle">2</text>
      <text x="575" y="956" fill="#f6f8ff" font-size="24" font-weight="700" text-anchor="middle">RETRIEVE</text>

      <circle cx="930" cy="860" r="58" fill="#2c2855" stroke="#a18cff" stroke-width="3"/>
      <text x="930" y="872" fill="#c1b5ff" font-size="36" font-weight="700" text-anchor="middle">3</text>
      <text x="930" y="956" fill="#f6f8ff" font-size="24" font-weight="700" text-anchor="middle">REFLECT</text>

      <circle cx="1285" cy="860" r="58" fill="#163a58" stroke="#76dff9" stroke-width="3"/>
      <text x="1285" y="872" fill="#76dff9" font-size="36" font-weight="700" text-anchor="middle">4</text>
      <text x="1285" y="956" fill="#f6f8ff" font-size="24" font-weight="700" text-anchor="middle">AUDIT</text>
    </g>

    <line x1="280" y1="860" x2="505" y2="860" stroke="#416a8d" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="635" y1="860" x2="860" y2="860" stroke="#416a8d" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="990" y1="860" x2="1215" y2="860" stroke="#416a8d" stroke-width="4" marker-end="url(#arrow)"/>
  </g>

  <rect x="1565" y="300" width="155" height="705" rx="28" fill="#0b1b2f" stroke="#263e5c" stroke-width="2"/>
  <text x="1642" y="355" fill="#7fe6ff" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">SAFETY</text>
  <text x="1642" y="422" fill="#d7e5f8" font-family="Arial, sans-serif" font-size="17" text-anchor="middle">Per-user</text>
  <text x="1642" y="447" fill="#d7e5f8" font-family="Arial, sans-serif" font-size="17" text-anchor="middle">retrieval</text>
  <line x1="1595" y1="482" x2="1688" y2="482" stroke="#274769"/>
  <text x="1642" y="540" fill="#d7e5f8" font-family="Arial, sans-serif" font-size="17" text-anchor="middle">No diagnosis</text>
  <text x="1642" y="565" fill="#d7e5f8" font-family="Arial, sans-serif" font-size="17" text-anchor="middle">No prediction</text>
  <line x1="1595" y1="600" x2="1688" y2="600" stroke="#274769"/>
  <text x="1642" y="658" fill="#d7e5f8" font-family="Arial, sans-serif" font-size="17" text-anchor="middle">No invented</text>
  <text x="1642" y="683" fill="#d7e5f8" font-family="Arial, sans-serif" font-size="17" text-anchor="middle">facts</text>
  <line x1="1595" y1="718" x2="1688" y2="718" stroke="#274769"/>
  <text x="1642" y="776" fill="#d7e5f8" font-family="Arial, sans-serif" font-size="17" text-anchor="middle">Exact memory</text>
  <text x="1642" y="801" fill="#d7e5f8" font-family="Arial, sans-serif" font-size="17" text-anchor="middle">ID audit</text>
  <line x1="1595" y1="836" x2="1688" y2="836" stroke="#274769"/>
  <text x="1642" y="894" fill="#d7e5f8" font-family="Arial, sans-serif" font-size="17" text-anchor="middle">Private demo</text>
  <text x="1642" y="919" fill="#d7e5f8" font-family="Arial, sans-serif" font-size="17" text-anchor="middle">access key</text>

  <text x="110" y="1125" fill="#8da7c7" font-family="Arial, sans-serif" font-size="22">Doream = Do + Dream · New isolated hackathon implementation · No production user data</text>
  <text x="1695" y="1125" fill="#8da7c7" font-family="Arial, sans-serif" font-size="18" text-anchor="end">Architecture v1 · 2026-07-21</text>
</svg>

