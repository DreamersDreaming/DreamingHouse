<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071424"/>
      <stop offset="0.55" stop-color="#10233f"/>
      <stop offset="1" stop-color="#101a36"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#77e4ff"/>
      <stop offset="1" stop-color="#a18cff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#76dff9"/>
    </marker>
  </defs>

  <rect width="1800" height="1200" rx="42" fill="url(#bg)"/>
  <circle cx="1500" cy="165" r="260" fill="#6b5cff" opacity="0.08"/>
  <circle cx="260" cy="1040" r="310" fill="#39d7ff" opacity="0.06"/>

  <text x="110" y="105" fill="#f6f8ff" font-family="Arial, sans-serif" font-size="48" font-weight="700">Doream Recall — Agentic Dream Memory</text>
  <text x="110" y="158" fill="#9bb4d5" font-family="Arial, sans-serif" font-size="25">Privacy-first remember → retrieve → reflect → audit architecture</text>
  <rect x="110" y="186" width="620" height="6" rx="3" fill="url(#accent)"/>

  <g filter="url(#shadow)">
    <rect x="90" y="300" width="310" height="245" rx="28" fill="#132b49" stroke="#2c5379" stroke-width="2"/>
    <circle cx="245" cy="368" r="36" fill="#76dff9" opacity="0.18"/>
    <path d="M225 369a20 20 0 1 1 40 0a20 20 0 1 1-40 0M205 439c20-31 60-31 80 0" fill="none" stroke="#76dff9" stroke-width="9" stroke-linecap="round"/>
    <text x="245" y="485" fill="#f6f8ff" font-family="Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle">Private session</text>
    <text x="245" y="522" fill="#9bb4d5" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">scene · emotion · context</text>

    <rect x="515" y="265" width="390" height="315" rx="30" fill="#172f54" stroke="#6256a9" stroke-width="2"/>
    <text x="710" y="330" fill="#a18cff" font-family="Arial, sans-serif" font-size="23" font-weight="700" text-anchor="middle">AWS SERVERLESS ORCHESTRATION</text>
    <text x="710" y="388" fill="#f6f8ff" font-family="Arial, sans-serif" font-size="35" font-weight="700" text-anchor="middle">AWS Lambda</text>
    <rect x="570" y="425" width="280" height="95" rx="18" fill="#0c1e35"/>
    <text x="710" y="462" fill="#7fe6ff" font-family="Arial, sans-serif" font-size="22" text-anchor="middle">Amazon Bedrock</text>
    <text x="710" y="494" fill="#9bb4d5" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Titan Embeddings V2</text>
    <text x="710" y="518" fill="#9bb4d5" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Amazon Nova Lite</text>

    <rect x="1030" y="265" width="505" height="315" rx="30" fill="#122a40" stroke="#2d8f9f" stroke-width="2"/>
    <text x="1282" y="330" fill="#76dff9" font-family="Arial, sans-serif" font-size="23" font-weight="700" text-anchor="middle">PERSISTENT AGENT MEMORY</text>
    <text x="1282" y="390" fill="#f6f8ff" font-family="Arial, sans-serif" font-size="35" font-weight="700" text-anchor="middle">CockroachDB Cloud</text>
    <text x="1282" y="440" fill="#9bb4d5" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">Dream memories + embeddings + audit</text>
    <rect x="1090" y="474" width="385" height="64" rx="16" fill="#0b1d2d"/>
    <text x="1282" y="515" fill="#7fe6ff" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">user_id prefix + cosine vector index</text>
  </g>

  <line x1="400" y1="420" x2="505" y2="420" stroke="#76dff9" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="905" y1="420" x2="1020" y2="420" stroke="#76dff9" stroke-width="6" marker-end="url(#arrow)"/>
  <path d="M1030 510 C960 640 855 650 790 580" fill="none" stroke="#a18cff" stroke-width="5" stroke-dasharray="12 12" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
